<svg viewBox="0 0 940 1140" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace,monospace" font-size="12">
  <title>Platform-XP-S3 Composition Flowchart</title>
  <desc>Crossplane XRD composition pipeline with blockPublicAccess, allowedCidrs inputs and conditional Step 3 BucketPolicy</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="940" height="1140" fill="#0f172a"/>

  <!-- SECTION LABELS + DIVIDERS -->
  <text x="22" y="26" font-size="10" font-weight="600" fill="#475569" letter-spacing="1.5">INPUTS</text>
  <line x1="22" y1="32" x2="918" y2="32" stroke="#1e293b" stroke-width="1.5"/>

  <text x="22" y="185" font-size="10" font-weight="600" fill="#475569" letter-spacing="1.5">CLAIM</text>
  <line x1="22" y1="191" x2="918" y2="191" stroke="#1e293b" stroke-width="1.5"/>

  <text x="22" y="328" font-size="10" font-weight="600" fill="#475569" letter-spacing="1.5">PIPELINE · STEP 1</text>
  <line x1="22" y1="334" x2="918" y2="334" stroke="#1e293b" stroke-width="1.5"/>

  <text x="22" y="476" font-size="10" font-weight="600" fill="#475569" letter-spacing="1.5">PIPELINE · STEP 2</text>
  <line x1="22" y1="482" x2="918" y2="482" stroke="#1e293b" stroke-width="1.5"/>

  <text x="22" y="624" font-size="10" font-weight="600" fill="#475569" letter-spacing="1.5">PIPELINE · STEP 3  </text>
  <text x="208" y="624" font-size="9" font-weight="600" fill="#f87171">(conditional)</text>
  <line x1="22" y1="630" x2="918" y2="630" stroke="#1e293b" stroke-width="1.5"/>

  <text x="22" y="748" font-size="10" font-weight="600" fill="#475569" letter-spacing="1.5">COMPOSED RESOURCES</text>
  <line x1="22" y1="754" x2="918" y2="754" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ROW 1 — INPUTS -->
  <rect x="38" y="40" width="128" height="58" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="102" y="60" text-anchor="middle" font-weight="600" fill="#e2e8f0">buId</text>
  <text x="102" y="76" text-anchor="middle" fill="#94a3b8" font-size="10">string · required</text>
  <text x="102" y="90" text-anchor="middle" fill="#64748b" font-size="10">BU\d{3}</text>

  <rect x="180" y="40" width="148" height="58" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="254" y="60" text-anchor="middle" font-weight="600" fill="#e2e8f0">awsAccountId</text>
  <text x="254" y="76" text-anchor="middle" fill="#94a3b8" font-size="10">string · required</text>
  <text x="254" y="90" text-anchor="middle" fill="#64748b" font-size="10">12-digit</text>

  <rect x="342" y="40" width="128" height="58" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="406" y="60" text-anchor="middle" font-weight="600" fill="#e2e8f0">region</text>
  <text x="406" y="76" text-anchor="middle" fill="#94a3b8" font-size="10">string · required</text>
  <text x="406" y="90" text-anchor="middle" fill="#64748b" font-size="10">e.g. us-east-1</text>

  <rect x="492" y="40" width="128" height="58" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="556" y="60" text-anchor="middle" font-weight="600" fill="#e2e8f0">versioning</text>
  <text x="556" y="76" text-anchor="middle" fill="#94a3b8" font-size="10">boolean · optional</text>
  <text x="556" y="90" text-anchor="middle" fill="#64748b" font-size="10">default: false</text>

  <rect x="634" y="40" width="148" height="58" rx="6" fill="#1c1917" stroke="#d97706" stroke-width="1.8"/>
  <text x="708" y="60" text-anchor="middle" font-weight="600" fill="#fcd34d">blockPublicAccess</text>
  <text x="708" y="76" text-anchor="middle" fill="#94a3b8" font-size="10">boolean · optional</text>
  <text x="708" y="90" text-anchor="middle" fill="#64748b" font-size="10">default: true</text>

  <rect x="796" y="40" width="128" height="58" rx="6" fill="#1c1917" stroke="#d97706" stroke-width="1.8"/>
  <text x="860" y="60" text-anchor="middle" font-weight="600" fill="#fcd34d">allowedCidrs</text>
  <text x="860" y="76" text-anchor="middle" fill="#94a3b8" font-size="10">string[] · optional</text>
  <text x="860" y="90" text-anchor="middle" fill="#64748b" font-size="10">IP CIDRs</text>

  <rect x="38" y="112" width="128" height="56" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="102" y="132" text-anchor="middle" font-weight="600" fill="#e2e8f0">tags</text>
  <text x="102" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">map · optional</text>
  <text x="102" y="162" text-anchor="middle" fill="#64748b" font-size="10">key-value strings</text>

  <rect x="184" y="112" width="740" height="26" rx="4" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="554" y="130" text-anchor="middle" fill="#475569" font-size="10">metadata.name → S3 bucket name (via crossplane.io/external-name annotation on composite)</text>

  <line x1="470" y1="168" x2="470" y2="193" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ROW 2 — CLAIM -->
  <rect x="270" y="198" width="400" height="68" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="470" y="223" text-anchor="middle" font-weight="700" font-size="13" fill="#a5b4fc">US3Bucket Claim</text>
  <text x="470" y="240" text-anchor="middle" fill="#94a3b8" font-size="10">apiVersion: storage.platform.urukube.io/v1alpha1</text>
  <text x="470" y="255" text-anchor="middle" fill="#94a3b8" font-size="10">kind: US3Bucket  ·  namespace-scoped</text>

  <line x1="470" y1="266" x2="470" y2="336" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ROW 3 — STEP 1 -->
  <rect x="38" y="344" width="155" height="62" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="116" y="364" text-anchor="middle" font-weight="600" fill="#e2e8f0" font-size="11">org-defaults</text>
  <text x="116" y="380" text-anchor="middle" fill="#94a3b8" font-size="10">EnvironmentConfig</text>
  <text x="116" y="394" text-anchor="middle" fill="#64748b" font-size="10">static reference</text>

  <rect x="210" y="344" width="165" height="62" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="293" y="364" text-anchor="middle" font-weight="600" fill="#e2e8f0" font-size="11">BU-specific config</text>
  <text x="293" y="380" text-anchor="middle" fill="#94a3b8" font-size="10">EnvironmentConfig</text>
  <text x="293" y="394" text-anchor="middle" fill="#64748b" font-size="10">label: bu-id=buId</text>

  <rect x="492" y="338" width="378" height="76" rx="8" fill="#1c1a0e" stroke="#d97706" stroke-width="2"/>
  <text x="681" y="362" text-anchor="middle" font-weight="700" font-size="12" fill="#fbbf24">function-environment-configs  v0.6.0</text>
  <text x="681" y="379" text-anchor="middle" fill="#94a3b8" font-size="10">merge org-defaults + BU config</text>
  <text x="681" y="394" text-anchor="middle" fill="#64748b" font-size="10">outputs: costCenter · ownerEmail · orgName · complianceScope · managedBy</text>

  <line x1="375" y1="375" x2="490" y2="375" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="116" y1="406" x2="116" y2="430" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="116" y1="430" x2="490" y2="430" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <line x1="681" y1="414" x2="681" y2="448" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="681" y1="448" x2="470" y2="448" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="470" y1="448" x2="470" y2="484" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ROW 4 — STEP 2 -->
  <rect x="270" y="488" width="400" height="66" rx="8" fill="#1c1a0e" stroke="#d97706" stroke-width="2"/>
  <text x="470" y="512" text-anchor="middle" font-weight="700" font-size="12" fill="#fbbf24">function-patch-and-transform  v0.10.7</text>
  <text x="470" y="529" text-anchor="middle" fill="#94a3b8" font-size="10">patch claims → ProviderConfig, Bucket, Encryption, Versioning, PublicAccessBlock</text>
  <text x="470" y="545" text-anchor="middle" fill="#64748b" font-size="10">env tags injected · versioning bool→status · blockPublicAccess drives PAB flags</text>

  <line x1="470" y1="554" x2="470" y2="600" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="130" y1="600" x2="870" y2="600" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="130" y1="600" x2="130" y2="756" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <line x1="300" y1="600" x2="300" y2="756" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <line x1="470" y1="600" x2="470" y2="756" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <line x1="640" y1="600" x2="640" y2="756" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <line x1="640" y1="600" x2="738" y2="600" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="738" y1="600" x2="738" y2="886" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>

  <line x1="470" y1="554" x2="470" y2="626" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ROW 5 — STEP 3 conditional -->
  <polygon points="470,642 530,672 470,702 410,672" fill="#1a0808" stroke="#f87171" stroke-width="1.8"/>
  <text x="470" y="666" text-anchor="middle" font-size="10" font-weight="600" fill="#fca5a5">blockPublicAccess</text>
  <text x="470" y="679" text-anchor="middle" font-size="10" font-weight="600" fill="#fca5a5">== false</text>
  <text x="470" y="692" text-anchor="middle" font-size="10" font-weight="600" fill="#fca5a5">&amp;&amp; allowedCidrs?</text>

  <line x1="530" y1="672" x2="610" y2="672" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="570" y="664" text-anchor="middle" fill="#f87171" font-size="10" font-weight="700">YES</text>

  <rect x="612" y="636" width="290" height="74" rx="8" fill="#1a0808" stroke="#f87171" stroke-width="2"/>
  <text x="757" y="660" text-anchor="middle" font-weight="700" font-size="12" fill="#fca5a5">function-go-templating  v0.7.0</text>
  <text x="757" y="677" text-anchor="middle" fill="#94a3b8" font-size="10">renders BucketPolicy via Go template</text>
  <text x="757" y="692" text-anchor="middle" fill="#64748b" font-size="10">Allow s3:GetObject to CIDRs · Deny all others</text>

  <line x1="410" y1="672" x2="340" y2="672" stroke="#475569" stroke-width="1.5"/>
  <text x="376" y="664" text-anchor="middle" fill="#475569" font-size="10" font-weight="700">NO</text>
  <text x="290" y="676" text-anchor="middle" fill="#475569" font-size="10">skip</text>

  <line x1="870" y1="710" x2="870" y2="756" stroke="#f87171" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>

  <!-- ROW 6 — COMPOSED RESOURCES -->
  <rect x="38" y="758" width="166" height="118" rx="8" fill="#0f1f18" stroke="#34d399" stroke-width="2"/>
  <text x="121" y="778" text-anchor="middle" font-weight="700" font-size="11" fill="#6ee7b7">ProviderConfig</text>
  <text x="121" y="793" text-anchor="middle" fill="#94a3b8" font-size="10">aws.upbound.io/v1beta1</text>
  <line x1="48" y1="800" x2="194" y2="800" stroke="#1e293b" stroke-width="1"/>
  <text x="121" y="815" text-anchor="middle" fill="#64748b" font-size="10">IRSA source</text>
  <text x="121" y="829" text-anchor="middle" fill="#64748b" font-size="10">assumeRoleChain →</text>
  <text x="121" y="843" text-anchor="middle" fill="#64748b" font-size="10">arn:aws:iam::</text>
  <text x="121" y="857" text-anchor="middle" fill="#64748b" font-size="10">&lt;acctId&gt;:role/</text>
  <text x="121" y="871" text-anchor="middle" fill="#64748b" font-size="10">urukube-crossplane-role</text>

  <rect x="218" y="758" width="166" height="118" rx="8" fill="#0f1f18" stroke="#34d399" stroke-width="2.5"/>
  <text x="301" y="778" text-anchor="middle" font-weight="700" font-size="11" fill="#6ee7b7">S3 Bucket</text>
  <text x="301" y="793" text-anchor="middle" fill="#94a3b8" font-size="10">s3.aws.upbound.io/v1beta2</text>
  <line x1="228" y1="800" x2="374" y2="800" stroke="#1e293b" stroke-width="1"/>
  <text x="301" y="815" text-anchor="middle" fill="#64748b" font-size="10">name ← claim name</text>
  <text x="301" y="829" text-anchor="middle" fill="#64748b" font-size="10">region ← spec.region</text>
  <text x="301" y="843" text-anchor="middle" fill="#64748b" font-size="10">tags ← env + user tags</text>
  <text x="301" y="862" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">parent resource</text>

  <rect x="398" y="758" width="166" height="118" rx="8" fill="#0f1f18" stroke="#34d399" stroke-width="2"/>
  <text x="481" y="778" text-anchor="middle" font-weight="700" font-size="11" fill="#6ee7b7">BucketEncryption</text>
  <text x="481" y="793" text-anchor="middle" fill="#94a3b8" font-size="10">s3.aws.upbound.io/v1beta1</text>
  <line x1="408" y1="800" x2="554" y2="800" stroke="#1e293b" stroke-width="1"/>
  <text x="481" y="815" text-anchor="middle" fill="#64748b" font-size="10">AES256 always on</text>
  <text x="481" y="829" text-anchor="middle" fill="#64748b" font-size="10">bucketKeyEnabled: true</text>
  <text x="481" y="845" text-anchor="middle" fill="#64748b" font-size="10">non-configurable</text>
  <text x="481" y="862" text-anchor="middle" fill="#6ee7b7" font-size="10">guardrail</text>

  <rect x="578" y="758" width="182" height="118" rx="8" fill="#1c1a0e" stroke="#d97706" stroke-width="2"/>
  <text x="669" y="778" text-anchor="middle" font-weight="700" font-size="11" fill="#fcd34d">PublicAccessBlock</text>
  <text x="669" y="793" text-anchor="middle" fill="#94a3b8" font-size="10">s3.aws.upbound.io/v1beta1</text>
  <line x1="588" y1="800" x2="750" y2="800" stroke="#1e293b" stroke-width="1"/>
  <text x="669" y="815" text-anchor="middle" fill="#64748b" font-size="10">all 4 flags ←</text>
  <text x="669" y="829" text-anchor="middle" fill="#64748b" font-size="10">blockPublicAccess param</text>
  <text x="669" y="845" text-anchor="middle" fill="#64748b" font-size="10">(was hardcoded true)</text>
  <text x="669" y="862" text-anchor="middle" fill="#fcd34d" font-size="10">configurable</text>

  <rect x="778" y="758" width="148" height="118" rx="8" fill="#1a0808" stroke="#f87171" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="852" y="778" text-anchor="middle" font-weight="700" font-size="11" fill="#fca5a5">BucketPolicy</text>
  <text x="852" y="793" text-anchor="middle" fill="#94a3b8" font-size="10">s3.aws.upbound.io/v1beta1</text>
  <line x1="788" y1="800" x2="916" y2="800" stroke="#1e293b" stroke-width="1"/>
  <text x="852" y="815" text-anchor="middle" fill="#64748b" font-size="10">Allow GetObject</text>
  <text x="852" y="829" text-anchor="middle" fill="#64748b" font-size="10">to allowedCidrs</text>
  <text x="852" y="845" text-anchor="middle" fill="#64748b" font-size="10">Deny all others</text>
  <text x="852" y="862" text-anchor="middle" fill="#f87171" font-size="10">conditional</text>

  <rect x="578" y="886" width="182" height="54" rx="8" fill="#0f1f18" stroke="#34d399" stroke-width="2"/>
  <text x="669" y="907" text-anchor="middle" font-weight="700" font-size="11" fill="#6ee7b7">BucketVersioning</text>
  <text x="669" y="924" text-anchor="middle" fill="#64748b" font-size="10">versioning bool → Enabled / Suspended</text>

  <!-- parent-child dashed bindings -->
  <line x1="384" y1="818" x2="396" y2="818" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <line x1="301" y1="876" x2="301" y2="910" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="301" y1="910" x2="852" y2="910" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="640" y1="910" x2="640" y2="878" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <line x1="852" y1="910" x2="852" y2="878" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <line x1="480" y1="910" x2="578" y2="913" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>

  <!-- LEGEND -->
  <rect x="38" y="960" width="868" height="56" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <line x1="56" y1="988" x2="86" y2="988" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="94" y="992" fill="#94a3b8" font-size="10">data flow</text>
  <line x1="155" y1="988" x2="185" y2="988" stroke="#475569" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="193" y="992" fill="#94a3b8" font-size="10">parent-child (matchControllerRef)</text>
  <rect x="375" y="979" width="12" height="12" rx="2" fill="none" stroke="#818cf8" stroke-width="2"/>
  <text x="393" y="990" fill="#94a3b8" font-size="10">claim</text>
  <rect x="430" y="979" width="12" height="12" rx="2" fill="none" stroke="#d97706" stroke-width="2"/>
  <text x="448" y="990" fill="#94a3b8" font-size="10">composition function</text>
  <rect x="562" y="979" width="12" height="12" rx="2" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="580" y="990" fill="#94a3b8" font-size="10">always-on resource</text>
  <rect x="685" y="979" width="12" height="12" rx="2" fill="none" stroke="#f87171" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="703" y="990" fill="#94a3b8" font-size="10">conditional resource</text>

  <text x="470" y="1038" text-anchor="middle" fill="#334155" font-size="10">Platform-XP-S3 · Crossplane XRD Composition Pipeline</text>
</svg>
