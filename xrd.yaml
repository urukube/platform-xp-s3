---
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xus3buckets.storage.platform.urukube.io
spec:
  group: storage.platform.urukube.io
  names:
    kind: XUS3Bucket
    plural: xus3buckets
  claimNames:
    kind: US3Bucket
    plural: us3buckets
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - parameters
              properties:
                parameters:
                  type: object
                  required:
                    - region
                    - awsAccountId
                    - buId
                  properties:
                    buId:
                      type: string
                      description: Business Unit identifier — must match an EnvironmentConfig with label bu-id
                      pattern: "^BU[0-9]{3}$"
                    awsAccountId:
                      type: string
                      description: AWS account ID where the S3 bucket will be created
                      pattern: "^[0-9]{12}$"
                    region:
                      type: string
                      description: AWS region where the S3 bucket will be created
                    versioning:
                      type: boolean
                      default: false
                      description: Enable S3 versioning on the bucket
                    blockPublicAccess:
                      type: boolean
                      default: true
                      description: Block all public access to the bucket. Set to false together with allowedCidrs to open access to specific IP ranges only.
                    allowedCidrs:
                      type: array
                      items:
                        type: string
                      description: >-
                        IP CIDRs granted public s3:GetObject access. Required when
                        blockPublicAccess is false — a BucketPolicy scoped to these
                        ranges is created automatically. Has no effect when
                        blockPublicAccess is true.
                    tags:
                      type: object
                      additionalProperties:
                        type: string
                      description: Additional tags to apply to the bucket
